<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omega Hires · Invoice Builder</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@400;500;600;700&family=Caveat:wght@600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="builder.css">
  <link rel="stylesheet" href="invoice.css">
</head>
<body>

  <!-- ============================================================
       SIDEBAR
       ============================================================ -->
  <aside class="sidebar">
    <header class="sb-header">
      <div class="sb-logo">
        <div class="sb-logo-mark">Ω</div>
        <div class="sb-logo-text">
          <span class="top">Omega<span class="green">Hires</span></span>
          <span class="bot">Invoice Studio</span>
        </div>
      </div>
      <span class="sb-version">v2.0</span>
    </header>

    <div class="sb-body">
      <nav class="sb-rail" role="tablist" aria-label="Invoice sections">
        <button class="sb-rail-btn active" data-rail="client" title="Client">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span class="label">Client</span>
        </button>
        <button class="sb-rail-btn" data-rail="recruitment" title="Candidate">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><polyline points="17 11 19 13 23 9"/></svg>
          <span class="label">Candidate</span>
        </button>
        <button class="sb-rail-btn" data-rail="details" title="Details">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span class="label">Details</span>
        </button>
        <button class="sb-rail-btn" data-rail="items" title="Items">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          <span class="label">Items</span>
        </button>
        <button class="sb-rail-btn" data-rail="totals" title="Tax">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="5" x2="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>
          <span class="label">Tax</span>
        </button>
        <button class="sb-rail-btn" data-rail="payment" title="Payment">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
          <span class="label">Bank</span>
        </button>
        <button class="sb-rail-btn" data-rail="notes" title="Signature">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18.42 2.41a2.121 2.121 0 0 1 3 3L7.37 19.53a1 1 0 0 1-.29.21l-4 1.5a.5.5 0 0 1-.64-.64l1.5-4a1 1 0 0 1 .21-.29L18.42 2.41z"/><path d="M15 5l3 3"/></svg>
          <span class="label">Signature</span>
        </button>
        <button class="sb-rail-btn" data-rail="company" title="Company">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18M5 21V7l8-4v18M19 21V11l-6-4"/></svg>
          <span class="label">Issuer</span>
        </button>
        <button class="sb-rail-btn" data-rail="drafts" title="Drafts">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
          <span class="label">Drafts</span>
        </button>
      </nav>

      <div class="sb-content">
        <section class="sb-panel active" data-panel="client" id="panel-client"></section>
        <section class="sb-panel" data-panel="recruitment" id="panel-recruitment"></section>
        <section class="sb-panel" data-panel="details" id="panel-details"></section>
        <section class="sb-panel" data-panel="items" id="panel-items"></section>
        <section class="sb-panel" data-panel="totals" id="panel-totals"></section>
        <section class="sb-panel" data-panel="payment" id="panel-payment"></section>
        <section class="sb-panel" data-panel="notes" id="panel-notes"></section>
        <section class="sb-panel" data-panel="company" id="panel-company"></section>
        <section class="sb-panel" data-panel="drafts" id="panel-drafts"></section>
      </div>
    </div>

    <footer class="sb-footer">
      <div class="totals-mini">
        <div class="row"><span>Subtotal</span><span class="v" id="ft-subtotal">—</span></div>
        <div class="row"><span>Tax (GST)</span><span class="v" id="ft-tax">—</span></div>
        <div class="row"><span>TDS</span><span class="v" id="ft-tds">—</span></div>
        <div class="row"><span>Paid</span><span class="v" id="ft-paid">—</span></div>
        <div class="row grand"><span class="l">Balance Due</span><span class="v" id="ft-balance">—</span></div>
      </div>
      <div class="sb-actions">
        <button class="btn-print" onclick="printInvoice()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Export PDF
        </button>
        <button class="btn-save" onclick="saveCurrentDraft()" title="Save draft">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        </button>
      </div>
    </footer>
  </aside>

  <!-- ============================================================
       WORKSPACE
       ============================================================ -->
  <main class="workspace">
    <div class="toolbar">
      <div class="tb-left">
        <div class="tb-crumbs">
          <span class="crumb">Invoices</span>
          <span class="sep">/</span>
          <span class="crumb active" id="tb-crumb-num">—</span>
          <span class="sep">·</span>
          <span class="crumb" id="tb-crumb-client">—</span>
        </div>
      </div>
      <div class="tb-right">
        <div class="template-switch" role="tablist" aria-label="Invoice template">
          <button data-tmpl="sovereign" class="active">Sovereign</button>
          <button data-tmpl="ledger">Ledger</button>
          <button data-tmpl="pulse">Pulse</button>
        </div>
        <div class="zoom-pill">
          <button onclick="zoomBy(-0.1)" title="Zoom out">−</button>
          <span class="val" id="zoom-val">85%</span>
          <button onclick="zoomBy(0.1)" title="Zoom in">+</button>
        </div>
        <button class="tb-btn" onclick="loadSample()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.5 0 4.8 1 6.5 2.6L21 8"/><polyline points="21 3 21 8 16 8"/></svg>
          Sample
        </button>
        <button class="tb-btn danger" onclick="resetAll()">Reset</button>
        <button class="tb-btn primary" onclick="printInvoice()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export
        </button>
      </div>
    </div>

    <div class="canvas">
      <div class="canvas-stage" id="canvas-stage">
        <div class="a4 sovereign" id="a4-stage"></div>
      </div>
    </div>
  </main>

  <div class="toast-host" id="toast-host"></div>
  <div id="tweaks-root"></div>

  <!-- App logic -->
  <script src="app.js"></script>

  <!-- React + Tweaks panel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="tweaks-app.jsx"></script>
</body>
</html>
